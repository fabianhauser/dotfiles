general {
    colors = true
    interval = 5
    color_good = "#009900"
}
#TODO: pomodoro, xrandr
order += "disk /"
order += "volume master"
order += "backlight"
order += "dpms"
order += "bluetooth"
order += "wireless wlp58s0"
order += "ethernet enp0s31f6"
order += "load"
order += "cpu_temperature 0"
order += "battery_level"
order += "time"
order += "keyboard_locks"

volume master {
	format = " %volume"
	format_muted = " (%volume)"
	device = "default"
	mixer = "Master"
	mixer_idx = 0
}

dpms {
    icon_off = ""
    icon_on = ""
    button_toggle = 3
	color_bad = "#009900"
	color_good = "#884444"
}

backlight {
    button_down = 0
    button_up = 0
    format = " {level}"
}

wireless wlp58s0 {
    format_up = " %ip (%quality %essid)"
    format_down = " wlp58s0"
    color_bad = "#884444"
}

ethernet enp0s31f6 {
    # if you use %speed, i3status requires root privileges
    format_up = "enp0: %ip"
    format_down = "enp0"
	color_bad = "#884444"
}

battery_level {
    battery_id = all
    blocks = ""
    charging_character = ""
    hide_seconds = "True"
    format = "{icon} {percent}% {time_remaining}"
}

bluetooth {
	color_bad = "#884444"
}

time {
        format = "%a %Y-%m-%d %H:%M:%S"
}

load {
        format = " %1min"
}

cpu_temperature 0 {
	format = "%degrees°C"
	path = "/sys/class/hwmon/hwmon2/temp1_input"
}

disk "/" {
	format = " %avail"
	low_threshold = 5
	threshold_type = percentage_avail
}

keyboard_locks {
    format = "{caps}{num}{scr}"
    icon_caps_off = "C"
    icon_caps_on = "C"
    icon_num_off = "N"
    icon_num_on = "N"
    icon_scr_off = "S"
    icon_scr_on = "S"
	color_bad = "#884444"
    color_good = "#009900"
}
