general {
    colors = true
    interval = 5
    color_good = "#009900"
}
#TODO: xrandr
order += "spotify"
order += "pomodoro"
order += "disk /"
order += "volume master"
order += "backlight"
order += "dpms"
order += "bluetooth"
order += "wireless wlp58s0"
order += "ethernet enp0s31f6"
order += "load"
order += "cpu_temperature 0"
order += "battery_level"
order += "time"
order += "keyboard_layout"
order += "keyboard_locks"

spotify {
    format = "⏯️"
    format_down = ""
    format_stopped = "⏹️"
    button_previous = 1
    button_play_pause = 2
    button_next = 3
    color_offline = "#884444"
}

pomodoro {
    format = "{mm}m"
    format_active = "🍅 {format}#{breakno}"
    format_break = "🍅 {format}#{breakno}"
    format_break_stopped = "🍅 {format}#{breakno}"
    format_stopped = "🍅 {format}#{breakno}"
    max_breaks = 3
    timer_break = 180
    timer_long_break = 600
    timer_pomodoro = 1620
    color_bad = "#884444"
}

volume master {
    format = " %volume"
    format_muted = " (%volume)"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

dpms {
    icon_off = ""
    icon_on = ""
    button_toggle = 3
    color_bad = "#009900"
    color_good = "#884444"
}

backlight {
    button_down = 0
    button_up = 0
    format = " {level}"
}

wireless wlp58s0 {
    format_up = " %ip (%quality %essid)"
    format_down = " wlp58s0"
    color_bad = "#884444"
    color_good = "#009900"
}

ethernet enp0s31f6 {
    # if you use %speed, i3status requires root privileges
    format_up = "🔗 %ip"
    format_down = "🔗"
    color_bad = "#884444"
}

battery_level {
    battery_id = all
    blocks = ""
    charging_character = ""
    hide_seconds = "True"
    format = "{icon} {percent}% {time_remaining}"
}

bluetooth {
    color_bad = "#884444"
    format = ""
}

time {
    format = "%a %Y-%m-%d %H:%M:%S"
}

load {
    format = " %1min"
}

cpu_temperature 0 {
    format = "%degrees°C"
    path = "/sys/class/hwmon/hwmon0/temp1_input"
}

disk "/" {
    format = " %avail"
    low_threshold = 5
    threshold_type = percentage_avail
}

keyboard_locks {
    color_bad = "#884444"
    color_good = "#009900"
    format = "[\?if=caps_lock&color=good C|\?color=bad C]"
    format += "[\?if=num_lock&color=good N|\?color=bad N]"
    format += "[\?if=scroll_lock&color=good S|\?color=bad S]"
}


keyboard_layout {
    layous = ['ch']
}
