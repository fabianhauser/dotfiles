general {
        colors = true
        interval = 3
}

order += "volume master"
order += "ipv6"
order += "run_watch VPN"
order += "wireless wlp3s0"
order += "ethernet enp0s25"
order += "ethernet wwp0s29u1u4i6"
order += "load"
order += "cpu_temperature 0"
order += "battery 0"
order += "time"

volume master {
	format = "♪%volume"
	format_muted = "♪∅"
	device = "default"
	mixer = "Master"
	mixer_idx = 0
}

ipv6 {
	format_up = "%ip"
	format_down = "IPv6"
}

wireless wlp3s0 {
        format_up = "W: %ip (%quality %essid)"
        format_down = "wlp3s0"
}

ethernet enp0s25 {
        # if you use %speed, i3status requires root privileges
        format_up = "enp0s25: %ip"
        format_down = "enp0s25"
}

ethernet wwp0s29u1u4i6 {
	format_up = "ww0s29: %ip"
	format_down = "ww0s29"
}

battery 0 {
        format = "%status %percentage %remaining"
}

run_watch VPN {
        pidfile = "/var/run/vpnc/defaultroute"
	format = "%title"
}

time {
        format = "%a %Y-%m-%d %H:%M:%S"
}

load {
        format = "%1min"
}

cpu_temperature 0 {
	format = "%degrees°C"
	path = "/sys/class/hwmon/hwmon2/temp1_input"
}

